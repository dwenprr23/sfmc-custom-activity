<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Alert Router</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/postmonger/0.0.16/postmonger.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; color: #333; }
    </style>
</head>
<body>
    <h2>Internal Email Router</h2>
    <p>This activity will route an email alert to your team when a user arrives. Click <b>Done</b> to save.</p>

    <script>
        // 2. ONLY run this script AFTER the CDN is 100% finished downloading
        window.onload = function() {
            
            var connection = new Postmonger.Session();
            var payload = {};
            var eventDefinitionKey;

            // 3. Kill the spinner
            console.log("UI Loaded successfully. Sending ready signal...");
            connection.trigger('ready');

            // 4. Request Journey Details
            connection.on('initActivity', function(data) {
                if (data) { payload = data; }
                connection.trigger('requestTriggerEventDefinition');
            });

            // 5. Enable the Done button
            connection.on('requestedTriggerEventDefinition', function(eventDefinitionModel) {
                if (eventDefinitionModel) {
                    eventDefinitionKey = eventDefinitionModel.eventDefinitionKey;
                }
                connection.trigger('updateButton', { button: 'next', enabled: true });
            });

            // 6. Save Data on Click
            connection.on('clickedNext', function() {
                payload.metaData = payload.metaData || {};
                payload.arguments = payload.arguments || {};
                payload.arguments.execute = payload.arguments.execute || {};
                
                var safeEventKey = eventDefinitionKey ? eventDefinitionKey : "UnknownEvent";
                var dynamicPhoneBinding = "{{Event." + safeEventKey + ".\"MobileNumber\"}}";

                payload.arguments.execute.inArguments = [
                    { "subscriberKey": "{{Contact.Key}}" },
                    { "mobileNumber": dynamicPhoneBinding }
                ];

                payload.metaData.isConfigured = true;
                connection.trigger('updateActivity', payload);
            });
        };
    </script>
</body>
</html>
